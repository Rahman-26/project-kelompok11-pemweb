<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In · projek_kelompok11_webToDoList</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    };
  </script>
</head>
<body class="h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  <div class="flex min-h-full flex-col justify-center px-4 py-10 sm:px-6 lg:px-8">
    <div class="mx-auto w-full max-w-md">
      <div class="mb-8 text-center">
        <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-2xl bg-indigo-600 text-lg font-bold text-white">TD</div>
        <h1 class="text-2xl font-bold tracking-tight">Team To-Do</h1>
        <p class="mt-2 text-sm text-slate-600 dark:text-slate-400">Collaborate on tasks across shared workspaces.</p>
      </div>

      <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900 sm:p-8">
        <div id="auth-message" class="mb-4 hidden rounded-lg border px-3 py-2 text-sm" role="alert"></div>

        <div class="mb-6 grid grid-cols-2 gap-1 rounded-xl bg-slate-100 p-1 dark:bg-slate-800">
          <button id="tab-login" type="button" class="rounded-lg bg-white px-3 py-2 text-sm font-medium text-slate-900 shadow-sm dark:bg-slate-900 dark:text-white">Login</button>
          <button id="tab-register" type="button" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 dark:text-slate-300">Register</button>
        </div>

        <form id="login-form" class="space-y-4" novalidate>
          <div>
            <label for="login-email" class="mb-1 block text-sm font-medium">Email</label>
            <input id="login-email" name="email" type="email" required autocomplete="email" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-indigo-500 focus:ring-2 dark:border-slate-600 dark:bg-slate-950">
          </div>
          <div>
            <label for="login-password" class="mb-1 block text-sm font-medium">Password</label>
            <input id="login-password" name="password" type="password" required autocomplete="current-password" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-indigo-500 focus:ring-2 dark:border-slate-600 dark:bg-slate-950">
          </div>
          <button type="submit" class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-indigo-500">Sign in</button>
        </form>

        <form id="register-form" class="hidden space-y-4" novalidate>
          <div>
            <label for="register-name" class="mb-1 block text-sm font-medium">Name</label>
            <input id="register-name" name="name" type="text" required autocomplete="name" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-indigo-500 focus:ring-2 dark:border-slate-600 dark:bg-slate-950">
          </div>
          <div>
            <label for="register-email" class="mb-1 block text-sm font-medium">Email</label>
            <input id="register-email" name="email" type="email" required autocomplete="email" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-indigo-500 focus:ring-2 dark:border-slate-600 dark:bg-slate-950">
          </div>
          <div>
            <label for="register-password" class="mb-1 block text-sm font-medium">Password</label>
            <input id="register-password" name="password" type="password" required minlength="8" autocomplete="new-password" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-indigo-500 focus:ring-2 dark:border-slate-600 dark:bg-slate-950">
            <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">Minimum 8 characters</p>
          </div>
          <button type="submit" class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-indigo-500">Create account</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
