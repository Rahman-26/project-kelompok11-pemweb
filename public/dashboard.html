<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard · projek_kelompok11_webToDoList</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    };
  </script>
</head>
<body class="h-full bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  <div id="sidebar-overlay" class="fixed inset-0 z-30 hidden bg-slate-900/50 lg:hidden" aria-hidden="true"></div>

  <div class="flex min-h-full">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 flex w-72 -translate-x-full flex-col border-r border-slate-200 bg-white transition-transform duration-200 dark:border-slate-800 dark:bg-slate-900 lg:static lg:translate-x-0">
      <div class="border-b border-slate-200 px-5 py-5 dark:border-slate-800">
        <div class="flex items-center gap-3">
          <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-indigo-600 text-sm font-bold text-white">TD</div>
          <div>
            <p class="font-semibold">Team To-Do</p>
            <p class="text-xs text-slate-500 dark:text-slate-400">Workspaces</p>
          </div>
        </div>
      </div>

      <div class="flex-1 overflow-y-auto px-3 py-4">
        <div class="mb-3 flex items-center justify-between px-2">
          <h2 class="text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Your spaces</h2>
          <button id="new-workspace-btn" type="button" class="rounded-lg bg-indigo-600 px-2.5 py-1 text-xs font-medium text-white hover:bg-indigo-500">New</button>
        </div>
        <nav id="workspace-list" class="space-y-1" aria-label="Workspaces"></nav>
      </div>

      <div class="border-t border-slate-200 px-5 py-4 dark:border-slate-800">
        <p id="user-name" class="truncate text-sm font-medium"></p>
        <p id="user-email" class="truncate text-xs text-slate-500 dark:text-slate-400"></p>
        <button id="logout-btn" type="button" class="mt-3 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800">Log out</button>
      </div>
    </aside>

    <div class="flex min-w-0 flex-1 flex-col">
      <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 backdrop-blur dark:border-slate-800 dark:bg-slate-900/90">
        <div class="flex items-center gap-3 px-4 py-4 sm:px-6">
          <button id="menu-toggle" type="button" class="rounded-lg border border-slate-200 p-2 text-slate-700 hover:bg-slate-50 lg:hidden dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800" aria-label="Open sidebar">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <div class="min-w-0 flex-1">
            <h1 id="workspace-title" class="truncate text-lg font-semibold sm:text-xl">Dashboard</h1>
            <p id="workspace-subtitle" class="truncate text-sm text-slate-500 dark:text-slate-400">Select a workspace to get started.</p>
          </div>
          <button id="new-task-btn" type="button" class="rounded-lg bg-indigo-600 px-3 py-2 text-sm font-semibold text-white hover:bg-indigo-500">Add task</button>
        </div>
      </header>

      <main class="flex-1 px-4 py-6 sm:px-6">
        <section class="mb-6 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900 sm:p-5">
          <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Search &amp; filter</h2>
            <div class="flex gap-2">
              <button id="clear-filters-btn" type="button" class="rounded-lg border border-slate-200 px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-50 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800">Clear</button>
              <button id="apply-filters-btn" type="button" class="rounded-lg bg-slate-900 px-3 py-1.5 text-sm text-white hover:bg-slate-800 dark:bg-slate-100 dark:text-slate-900 dark:hover:bg-white">Apply</button>
            </div>
          </div>

          <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 xl:grid-cols-4">
            <div class="sm:col-span-2 xl:col-span-1">
              <label for="filter-search" class="mb-1 block text-xs font-medium text-slate-600 dark:text-slate-300">Search</label>
              <input id="filter-search" type="search" placeholder="Title or description" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-indigo-500 focus:ring-2 dark:border-slate-600 dark:bg-slate-950">
            </div>
            <div>
              <label for="filter-status" class="mb-1 block text-xs font-medium text-slate-600 dark:text-slate-300">Status</label>
              <select id="filter-status" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-indigo-500 focus:ring-2 dark:border-slate-600 dark:bg-slate-950">
                <option value="">All statuses</option>
                <option value="todo">Todo</option>
                <option value="in_progress">In progress</option>
                <option value="done">Done</option>
              </select>
            </div>
            <div>
              <label for="filter-priority" class="mb-1 block text-xs font-medium text-slate-600 dark:text-slate-300">Priority</label>
              <select id="filter-priority" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-indigo-500 focus:ring-2 dark:border-slate-600 dark:bg-slate-950">
                <option value="">All priorities</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <div>
              <label for="filter-assignee" class="mb-1 block text-xs font-medium text-slate-600 dark:text-slate-300">Assignee</label>
              <select id="filter-assignee" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-indigo-500 focus:ring-2 dark:border-slate-600 dark:bg-slate-950">
                <option value="">All assignees</option>
              </select>
            </div>
          </div>
        </section>

        <section id="task-list" class="space-y-4" aria-live="polite"></section>
      </main>
    </div>
  </div>

  <div id="toast" class="fixed bottom-4 right-4 z-50 hidden rounded-lg px-4 py-3 text-sm font-medium text-white shadow-lg" role="status"></div>

  <div id="workspace-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/50 px-4">
    <div class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-xl dark:border-slate-700 dark:bg-slate-900">
      <div class="mb-4 flex items-center justify-between">
        <h3 class="text-lg font-semibold">New workspace</h3>
        <button type="button" data-close-modal="workspace-modal" class="rounded-lg p-1 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800" aria-label="Close">&times;</button>
      </div>
      <form id="workspace-form" class="space-y-4">
        <div>
          <label for="workspace-name" class="mb-1 block text-sm font-medium">Name</label>
          <input id="workspace-name" name="name" required class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-indigo-500 focus:ring-2 dark:border-slate-600 dark:bg-slate-950">
        </div>
        <div>
          <label for="workspace-description" class="mb-1 block text-sm font-medium">Description</label>
          <textarea id="workspace-form-description" name="description" rows="3" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-indigo-500 focus:ring-2 dark:border-slate-600 dark:bg-slate-950"></textarea>
        </div>
        <button type="submit" class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-indigo-500">Create workspace</button>
      </form>
    </div>
  </div>

  <div id="task-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/50 px-4">
    <div class="w-full max-w-lg rounded-2xl border border-slate-200 bg-white p-6 shadow-xl dark:border-slate-700 dark:bg-slate-900">
      <div class="mb-4 flex items-center justify-between">
        <h3 id="task-modal-title" class="text-lg font-semibold">New Task</h3>
        <button type="button" data-close-modal="task-modal" class="rounded-lg p-1 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800" aria-label="Close">&times;</button>
      </div>
      <form id="task-form" class="space-y-4" data-mode="create">
        <div>
          <label for="task-title" class="mb-1 block text-sm font-medium">Title</label>
          <input id="task-title" name="title" required class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-indigo-500 focus:ring-2 dark:border-slate-600 dark:bg-slate-950">
        </div>
        <div>
          <label for="task-description" class="mb-1 block text-sm font-medium">Description</label>
          <textarea id="task-description" name="description" rows="3" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-indigo-500 focus:ring-2 dark:border-slate-600 dark:bg-slate-950"></textarea>
        </div>
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label for="task-status" class="mb-1 block text-sm font-medium">Status</label>
            <select id="task-status" name="status" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-indigo-500 focus:ring-2 dark:border-slate-600 dark:bg-slate-950">
              <option value="todo">Todo</option>
              <option value="in_progress">In progress</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div>
            <label for="task-priority" class="mb-1 block text-sm font-medium">Priority</label>
            <select id="task-priority" name="priority" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-indigo-500 focus:ring-2 dark:border-slate-600 dark:bg-slate-950">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div>
          <label for="task-assignedTo" class="mb-1 block text-sm font-medium">Assign to</label>
          <select id="task-assignedTo" name="assignedTo" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none ring-indigo-500 focus:ring-2 dark:border-slate-600 dark:bg-slate-950">
            <option value="">Unassigned</option>
          </select>
        </div>
        <button type="submit" class="w-full rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-indigo-500">Save task</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
